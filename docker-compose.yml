version: '3.8'

services:

  backend:
    build: ./backend
    container_name: quiz-backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file:
      - ./backend/.env
    environment:
      # Changed to MONGODB_URI to match your backend/server.js exactly
      - MONGODB_URI=mongodb://db:27017/quizdb

  frontend:
    build: ./frontend
    container_name: quiz-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.local
    environment:
      # Must be localhost because this URL is fetched by the user's web browser!
      # The browser doesn't know about Docker's internal "backend" hostname.
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

  db:
    image: mongo:7
    container_name: quiz-db
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    container_name: quiz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: quiz-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  mongo_data:
